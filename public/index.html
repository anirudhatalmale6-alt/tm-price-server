<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e94560">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>TM Price Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a14; color: #e2e8f0; min-height: 100vh; }

    .topbar { background: #111127; border-bottom: 1px solid rgba(255,255,255,0.06); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar h1 { font-size: 18px; font-weight: 800; color: #e94560; letter-spacing: 0.5px; }
    .topbar .version { font-size: 11px; color: rgba(255,255,255,0.25); margin-left: 8px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .event-count { font-size: 11px; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 12px; }

    /* Event Tabs */
    .event-tabs { background: #0e0e20; border-bottom: 1px solid rgba(255,255,255,0.06); padding: 0 24px; display: flex; gap: 0; position: sticky; top: 52px; z-index: 99; }
    .event-tab { padding: 12px 24px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.35); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; position: relative; min-width: 120px; text-align: center; user-select: none; }
    .event-tab:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.02); }
    .event-tab.active { color: #e94560; border-bottom-color: #e94560; background: rgba(233,69,96,0.04); }
    .event-tab .tab-label { display: block; font-size: 13px; }
    .event-tab .tab-event { display: block; font-size: 10px; margin-top: 2px; color: rgba(255,255,255,0.25); font-family: 'Courier New', monospace; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .event-tab.active .tab-event { color: rgba(233,69,96,0.5); }
    .event-tab .tab-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; display: none; position: absolute; top: 8px; right: 8px; }
    .event-tab.has-data .tab-dot { display: block; }

    .container { max-width: 1800px; margin: 0 auto; padding: 20px 24px; }
    .container.with-map { display: flex; gap: 20px; }
    .container.with-map .main-col { flex: 1; min-width: 0; }
    .container.with-map .map-col { width: 420px; flex-shrink: 0; position: sticky; top: 110px; align-self: flex-start; max-height: calc(100vh - 130px); overflow-y: auto; }
    .container.with-map .map-col::-webkit-scrollbar { width: 5px; }
    .container.with-map .map-col::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* Map panel */
    .map-panel { background: #111127; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; }
    .map-panel .map-title { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .map-panel .map-close { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 18px; cursor: pointer; padding: 0 4px; }
    .map-panel .map-close:hover { color: #ef4444; }
    .map-panel .map-img-wrap { position: relative; border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.3); min-height: 200px; display: flex; align-items: center; justify-content: center; }
    .map-panel .map-img-wrap img { width: 100%; height: auto; display: block; cursor: zoom-in; }
    .map-panel .map-img-wrap img.zoomed { cursor: zoom-out; transform: scale(1.8); transform-origin: center center; }
    .map-panel .map-placeholder { font-size: 12px; color: rgba(255,255,255,0.25); text-align: center; padding: 40px 10px; }
    .map-panel .map-url-row { display: flex; gap: 6px; margin-top: 10px; }
    .map-panel .map-url-row input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 11px; outline: none; }
    .map-panel .map-url-row input::placeholder { color: rgba(255,255,255,0.2); }
    .map-panel .map-url-row button { padding: 6px 12px; }
    .map-btn-toggle { margin-left: auto; }

    .card { background: #111127; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

    .import-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .import-row input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .import-row input:focus { border-color: rgba(233,69,96,0.5); }
    .import-row input::placeholder { color: rgba(255,255,255,0.2); }

    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-primary:hover { background: #d63851; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-blue { background: #3b82f6; color: #fff; }
    .btn-blue:hover { background: #2563eb; }
    .btn-green { background: #22c55e; color: #fff; }
    .btn-green:hover { background: #16a34a; }
    .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 6px; }
    .btn-outline-red { background: none; border: 1px solid rgba(239,68,68,0.4); color: #ef4444; }
    .btn-outline-red:hover { background: rgba(239,68,68,0.1); }

    .or-divider { text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); margin: 6px 0; }

    .paste-area { width: 100%; height: 80px; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.12); border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 11px; font-family: 'Courier New', monospace; resize: vertical; outline: none; }
    .paste-area::placeholder { color: rgba(255,255,255,0.15); }
    .paste-area:focus { border-color: rgba(233,69,96,0.4); }

    .event-info { background: rgba(59,130,246,0.06); border: 1px solid rgba(59,130,246,0.15); border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; display: none; }
    .event-info .event-name { font-size: 16px; font-weight: 700; color: #60a5fa; }
    .event-info .event-meta { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
    .event-info .event-stats { display: flex; gap: 16px; margin-top: 8px; }
    .event-info .stat-item { font-size: 12px; }
    .event-info .stat-num { font-weight: 700; color: #fff; }

    .legend { display: flex; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: rgba(255,255,255,0.6); }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

    .controls { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
    .controls input, .controls select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 12px; outline: none; }
    .controls input { min-width: 180px; }
    .controls select { cursor: pointer; }
    .controls select option { background: #111127; }

    .bulk-bar { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .bulk-bar span { font-size: 11px; color: rgba(255,255,255,0.4); }
    .bulk-btn { padding: 5px 14px; border: none; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; color: #fff; transition: all 0.15s; }
    .bulk-btn:hover { filter: brightness(1.2); }
    .bulk-btn.bp1 { background: rgba(34,197,94,0.25); border: 1px solid #22c55e; }
    .bulk-btn.bp2 { background: rgba(234,179,8,0.25); border: 1px solid #eab308; }
    .bulk-btn.bp3 { background: rgba(59,130,246,0.25); border: 1px solid #3b82f6; }
    .bulk-btn.bavoid { background: rgba(239,68,68,0.25); border: 1px solid #ef4444; }
    .bulk-btn.bclear { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); }

    /* Zone bar */
    .zone-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .zone-bar .zone-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-right: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .zone-btn { padding: 5px 14px; border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.04); transition: all 0.15s; }
    .zone-btn:hover { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.06); }
    .zone-btn.active { border-color: #e94560; color: #fff; background: rgba(233,69,96,0.2); }
    .zone-btn .zone-count { font-size: 9px; color: rgba(255,255,255,0.3); margin-left: 3px; }
    .zone-btn.active .zone-count { color: rgba(255,255,255,0.6); }

    /* Quick actions bar */
    .quick-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .quick-bar .quick-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-right: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .quick-btn { padding: 5px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.03); transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
    .quick-btn:hover { border-color: rgba(59,130,246,0.5); color: #60a5fa; background: rgba(59,130,246,0.08); }
    .quick-btn .qicon { font-size: 12px; }

    /* Zone assign row */
    .zone-assign { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; padding: 8px 12px; background: rgba(233,69,96,0.04); border: 1px solid rgba(233,69,96,0.12); border-radius: 8px; display: none; }
    .zone-assign .za-label { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 600; }
    .zone-assign.visible { display: flex; }

    .table-wrap { overflow-x: auto; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; max-height: 500px; overflow-y: auto; }
    .table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    .table-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { position: sticky; top: 0; z-index: 10; }
    th { text-align: left; padding: 10px 12px; background: #1a1a35; color: rgba(255,255,255,0.5); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; user-select: none; white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.06); }
    th:hover { color: rgba(255,255,255,0.8); }
    th .sort-arrow { font-size: 9px; margin-left: 3px; color: rgba(255,255,255,0.3); }
    td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    tr:hover { background: rgba(255,255,255,0.02); }
    .price-cell { font-weight: 600; font-family: 'Courier New', monospace; }
    .qty-cell { text-align: center; }
    .type-cell { font-size: 11px; color: rgba(255,255,255,0.35); }

    .row-check { width: 16px; height: 16px; cursor: pointer; accent-color: #e94560; }

    .priority-select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 5px 8px; color: #fff; font-size: 11px; cursor: pointer; min-width: 80px; }
    .priority-select option { background: #111127; }
    .priority-select.ps1 { border-color: #22c55e; background: rgba(34,197,94,0.12); }
    .priority-select.ps2 { border-color: #eab308; background: rgba(234,179,8,0.12); }
    .priority-select.ps3 { border-color: #3b82f6; background: rgba(59,130,246,0.12); }
    .priority-select.psavoid { border-color: #ef4444; background: rgba(239,68,68,0.12); }

    tr.rp1 { border-left: 3px solid #22c55e; }
    tr.rp2 { border-left: 3px solid #eab308; }
    tr.rp3 { border-left: 3px solid #3b82f6; }
    tr.rpavoid { border-left: 3px solid #ef4444; }

    .bottom-bar { position: sticky; bottom: 0; background: #111127; border-top: 1px solid rgba(255,255,255,0.06); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; margin-top: 16px; border-radius: 12px; gap: 10px; flex-wrap: wrap; }
    .bottom-bar .summary { font-size: 12px; color: rgba(255,255,255,0.5); }
    .bottom-bar .summary strong { color: #fff; }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 1000; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #22c55e; color: #fff; }
    .toast.error { background: #ef4444; color: #fff; }
    .toast.info { background: #3b82f6; color: #fff; }

    .event-id-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .event-id-row label { font-size: 12px; color: rgba(255,255,255,0.5); white-space: nowrap; }
    .event-id-row input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 12px; outline: none; font-family: 'Courier New', monospace; }

    .active-events { margin-top: 12px; }
    .active-event { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 6px; font-size: 12px; cursor: pointer; transition: background 0.15s; }
    .active-event:hover { background: rgba(255,255,255,0.06); }
    .active-event .ae-id { font-family: 'Courier New', monospace; color: #60a5fa; }
    .active-event .ae-rules { color: rgba(255,255,255,0.4); }
    .active-event .ae-delete { color: #ef4444; cursor: pointer; font-size: 14px; padding: 2px 6px; border: none; background: none; }

    .empty-state { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.25); }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; margin-top: 6px; }

    /* Tab content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    @media (max-width: 768px) {
      .container { padding: 12px; }
      .controls { flex-direction: column; }
      .controls input { min-width: 100%; }
      .bulk-bar { flex-wrap: wrap; }
      .event-tabs { overflow-x: auto; }
      .event-tab { min-width: 90px; padding: 10px 14px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div style="display:flex;align-items:baseline;">
      <h1>TM PRICE ADMIN</h1>
      <span class="version">v3.2</span>
    </div>
    <div class="topbar-right">
      <span class="event-count" id="eventCount">0 events</span>
    </div>
  </div>

  <!-- Event Tabs -->
  <div class="event-tabs" id="eventTabs">
    <div class="event-tab active" data-tab="0">
      <span class="tab-dot"></span>
      <span class="tab-label">Event 1</span>
      <span class="tab-event" id="tabEvent0">Empty</span>
    </div>
    <div class="event-tab" data-tab="1">
      <span class="tab-dot"></span>
      <span class="tab-label">Event 2</span>
      <span class="tab-event" id="tabEvent1">Empty</span>
    </div>
    <div class="event-tab" data-tab="2">
      <span class="tab-dot"></span>
      <span class="tab-label">Event 3</span>
      <span class="tab-event" id="tabEvent2">Empty</span>
    </div>
    <div class="event-tab" data-tab="3">
      <span class="tab-dot"></span>
      <span class="tab-label">Event 4</span>
      <span class="tab-event" id="tabEvent3">Empty</span>
    </div>
  </div>

  <div class="container" id="mainContainer">
    <div class="main-col">
      <!-- Tab 0 -->
      <div class="tab-content active" id="tabContent0"></div>
      <!-- Tab 1 -->
      <div class="tab-content" id="tabContent1"></div>
      <!-- Tab 2 -->
      <div class="tab-content" id="tabContent2"></div>
      <!-- Tab 3 -->
      <div class="tab-content" id="tabContent3"></div>

      <!-- Active Events Card (shared) -->
      <div class="card" style="margin-top:16px;">
        <div class="card-title">Active Events on Server</div>
        <div class="active-events" id="activeEvents">
          <div class="empty-state">
            <div class="empty-icon">&#128203;</div>
            <p>No events with rules yet</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Map Panel (hidden by default) -->
    <div class="map-col" id="mapCol" style="display:none;">
      <div class="map-panel">
        <div class="map-title">
          <span>Venue Map</span>
          <button class="map-close" onclick="hideMap()">&times;</button>
        </div>
        <div class="map-img-wrap" id="mapImgWrap">
          <div class="map-placeholder" id="mapPlaceholder">Loading venue map...</div>
        </div>
        <div class="map-url-row">
          <input type="text" id="mapUrlInput" placeholder="Paste custom map image URL...">
          <button class="btn btn-sm btn-blue" onclick="loadCustomMap()">Load</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ============ CONSTANTS ============
    const SERVER = window.location.origin;
    const NUM_TABS = 4;
    const PRIORITY_LABELS = { '1': '1st Priority', '2': '2nd Target', '3': '3rd Target', 'avoid': 'Avoid' };
    const PRIORITY_COLORS = { '1': '#22c55e', '2': '#eab308', '3': '#3b82f6', 'avoid': '#ef4444' };

    // ============ PER-TAB STATE ============
    const tabState = [];
    for (let i = 0; i < NUM_TABS; i++) {
      tabState.push({
        inventoryData: [],
        reportEventId: '',
        eventName: '',
        sortCol: 'price',
        sortAsc: true,
        zones: [],
        activeZone: '',
        filteredOrder: [],
        lastCheckedVisualIdx: -1
      });
    }
    let activeTab = 0;

    // ============ BUILD TAB HTML ============
    function buildTabHtml(idx) {
      return `
        <div class="card">
          <div class="card-title">Import Broker Buds Report</div>
          <div class="import-row">
            <input type="text" id="reportUrl${idx}" placeholder="Paste Broker Buds report URL here...">
            <button class="btn btn-blue" onclick="importFromUrl(${idx})">Import</button>
          </div>
          <div class="or-divider">— or paste the raw HTML source —</div>
          <textarea class="paste-area" id="reportHtml${idx}" placeholder="Paste the complete HTML source code of the Broker Buds report here..."></textarea>
          <button class="btn btn-blue btn-sm" onclick="parseFromHtml(${idx})" style="margin-top:8px;width:100%;">Parse Pasted HTML</button>
        </div>

        <div class="event-info" id="eventInfo${idx}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div class="event-name" id="eventName${idx}"></div>
              <div class="event-meta" id="eventMeta${idx}"></div>
              <div class="event-stats">
                <div class="stat-item"><span class="stat-num" id="statEntries${idx}">0</span> entries</div>
                <div class="stat-item"><span class="stat-num" id="statTickets${idx}">0</span> tickets</div>
                <div class="stat-item"><span class="stat-num" id="statPrices${idx}">0</span> price tiers</div>
              </div>
            </div>
            <button class="btn btn-sm btn-blue" onclick="toggleMap(${idx})" id="mapToggle${idx}">Show Map</button>
          </div>
        </div>

        <div class="card" id="eventIdCard${idx}" style="display:none;">
          <div class="event-id-row">
            <label>Event ID:</label>
            <input type="text" id="eventIdInput${idx}" placeholder="Auto-detected from report, or enter manually">
          </div>
        </div>

        <div id="inventorySection${idx}" style="display:none;">
          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div>1st Priority</div>
            <div class="legend-item"><div class="legend-dot" style="background:#eab308;"></div>2nd Target</div>
            <div class="legend-item"><div class="legend-dot" style="background:#3b82f6;"></div>3rd Target</div>
            <div class="legend-item"><div class="legend-dot" style="background:#ef4444;"></div>Avoid</div>
          </div>

          <!-- Zone Filter -->
          <div class="zone-bar" id="zoneBar${idx}"></div>

          <!-- Quick Actions -->
          <div class="quick-bar" id="quickBar${idx}"></div>

          <!-- Zone Assign (shown when zone is selected) -->
          <div class="zone-assign" id="zoneAssign${idx}">
            <span class="za-label" id="zoneAssignLabel${idx}">Assign zone:</span>
            <button class="bulk-btn bp1" onclick="assignZone(${idx},'1')">1st Priority</button>
            <button class="bulk-btn bp2" onclick="assignZone(${idx},'2')">2nd Target</button>
            <button class="bulk-btn bp3" onclick="assignZone(${idx},'3')">3rd Target</button>
            <button class="bulk-btn bavoid" onclick="assignZone(${idx},'avoid')">Avoid</button>
            <button class="bulk-btn bclear" onclick="assignZone(${idx},'')">Clear</button>
          </div>

          <div class="controls">
            <input type="text" id="filterSection${idx}" placeholder="Filter by section..." oninput="renderInventory(${idx})">
            <select id="filterPrice${idx}" onchange="renderInventory(${idx})">
              <option value="">All prices</option>
            </select>
            <select id="filterPriority${idx}" onchange="renderInventory(${idx})">
              <option value="">All priorities</option>
              <option value="1">1st Priority</option>
              <option value="2">2nd Target</option>
              <option value="3">3rd Target</option>
              <option value="avoid">Avoid</option>
              <option value="none">Unassigned</option>
            </select>
          </div>

          <div class="bulk-bar">
            <input type="checkbox" class="row-check" id="checkAll${idx}" onchange="toggleCheckAll(${idx}, this.checked)">
            <span>Assign selected:</span>
            <button class="bulk-btn bp1" onclick="assignSelected(${idx},'1')">1st Priority</button>
            <button class="bulk-btn bp2" onclick="assignSelected(${idx},'2')">2nd Target</button>
            <button class="bulk-btn bp3" onclick="assignSelected(${idx},'3')">3rd Target</button>
            <button class="bulk-btn bavoid" onclick="assignSelected(${idx},'avoid')">Avoid</button>
            <button class="bulk-btn bclear" onclick="assignSelected(${idx},'')">Clear</button>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:30px;"><input type="checkbox" class="row-check" id="checkAllHead${idx}" onchange="toggleCheckAll(${idx}, this.checked)"></th>
                  <th data-sort="section" onclick="toggleSort(${idx},'section')">Section <span class="sort-arrow" id="sortArrow${idx}_section"></span></th>
                  <th data-sort="price" onclick="toggleSort(${idx},'price')">Price <span class="sort-arrow" id="sortArrow${idx}_price"></span></th>
                  <th data-sort="count" onclick="toggleSort(${idx},'count')">Qty <span class="sort-arrow" id="sortArrow${idx}_count"></span></th>
                  <th data-sort="type" onclick="toggleSort(${idx},'type')">Type <span class="sort-arrow" id="sortArrow${idx}_type"></span></th>
                  <th>Priority</th>
                </tr>
              </thead>
              <tbody id="inventoryBody${idx}"></tbody>
            </table>
          </div>

          <div class="bottom-bar">
            <div class="summary" id="summaryText${idx}">0 entries</div>
            <div style="display:flex;gap:8px;">
              <button class="btn btn-outline-red btn-sm" onclick="clearTab(${idx})">Clear Tab</button>
              <button class="btn btn-primary" onclick="pushRules(${idx})">Push Priority Rules</button>
            </div>
          </div>
        </div>
      `;
    }

    // ============ INIT ============
    document.addEventListener('DOMContentLoaded', () => {
      // Build tab contents
      for (let i = 0; i < NUM_TABS; i++) {
        document.getElementById('tabContent' + i).innerHTML = buildTabHtml(i);
      }

      // Tab click handlers
      document.querySelectorAll('.event-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const idx = parseInt(tab.dataset.tab);
          switchTab(idx);
        });
      });

      loadActiveEvents();
    });

    // ============ TAB SWITCHING ============
    function switchTab(idx) {
      activeTab = idx;
      document.querySelectorAll('.event-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`.event-tab[data-tab="${idx}"]`).classList.add('active');
      document.getElementById('tabContent' + idx).classList.add('active');
    }

    function updateTabLabel(idx) {
      const state = tabState[idx];
      const tabEl = document.querySelector(`.event-tab[data-tab="${idx}"]`);
      const labelEl = document.getElementById('tabEvent' + idx);

      if (state.eventName) {
        // Shorten event name for tab
        let shortName = state.eventName;
        if (shortName.length > 20) shortName = shortName.substring(0, 20) + '...';
        labelEl.textContent = shortName;
        tabEl.classList.add('has-data');
      } else {
        labelEl.textContent = 'Empty';
        tabEl.classList.remove('has-data');
      }
    }

    function clearTab(idx) {
      tabState[idx] = { inventoryData: [], reportEventId: '', eventName: '', sortCol: 'price', sortAsc: true, zones: [], activeZone: '', filteredOrder: [], lastCheckedVisualIdx: -1 };
      document.getElementById('tabContent' + idx).innerHTML = buildTabHtml(idx);
      updateTabLabel(idx);
      toast('Tab cleared', 'info');
    }

    // ============ IMPORT ============
    async function importFromUrl(idx) {
      const url = document.getElementById('reportUrl' + idx).value.trim();
      if (!url) { toast('Enter a report URL', 'error'); return; }

      toast('Fetching report...', 'info');

      try {
        const resp = await fetch(SERVER + '/api/proxy?url=' + encodeURIComponent(url));
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const html = await resp.text();
        parseReportHtml(idx, html);
      } catch (e) {
        toast('Failed to fetch: ' + e.message, 'error');
      }
    }

    function parseFromHtml(idx) {
      const html = document.getElementById('reportHtml' + idx).value.trim();
      if (!html) { toast('Paste the report HTML first', 'error'); return; }
      parseReportHtml(idx, html);
    }

    function parseReportHtml(idx, html) {
      const state = tabState[idx];
      try {
        let tickets;
        const ticketsMatch = html.match(/tickets:\s*(\[[\s\S]*?\])\s*[,\n\r]/);
        if (ticketsMatch) {
          tickets = JSON.parse(ticketsMatch[1]);
        } else {
          const altMatch = html.match(/"tickets":\s*(\[[\s\S]*?\])/);
          if (altMatch) tickets = JSON.parse(altMatch[1]);
          else { toast('Could not find ticket data in the report HTML', 'error'); return; }
        }

        state.inventoryData = tickets.map((t, i) => ({
          ...t,
          _priority: '',
          _checked: false,
          _idx: i
        }));

        // Extract event info
        let eventName = '';
        const titleMatch = html.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i);
        if (titleMatch) eventName = titleMatch[1].replace(/<[^>]+>/g, '').trim();
        state.eventName = eventName;

        const tmLinkMatch = html.match(/ticketmaster\.com\/[^"]*\/event\/([A-Z0-9]+)/i);
        if (tmLinkMatch) {
          state.reportEventId = tmLinkMatch[1];
          document.getElementById('eventIdInput' + idx).value = state.reportEventId;
        }

        // Show event info
        document.getElementById('eventName' + idx).textContent = eventName || 'Unknown Event';
        document.getElementById('eventMeta' + idx).textContent = state.reportEventId ? 'TM Event: ' + state.reportEventId : '';
        document.getElementById('statEntries' + idx).textContent = state.inventoryData.length;
        document.getElementById('statTickets' + idx).textContent = state.inventoryData.reduce((s, t) => s + (t.count || 0), 0).toLocaleString();
        const uniquePrices = [...new Set(state.inventoryData.map(t => t.price))];
        document.getElementById('statPrices' + idx).textContent = uniquePrices.length;
        document.getElementById('eventInfo' + idx).style.display = 'block';

        // Populate price filter
        const prices = uniquePrices.sort((a, b) => a - b);
        const filterPrice = document.getElementById('filterPrice' + idx);
        filterPrice.innerHTML = '<option value="">All prices ($' + prices[0] + ' — $' + prices[prices.length - 1] + ')</option>';
        prices.forEach(p => {
          filterPrice.innerHTML += '<option value="' + p + '">$' + p + '</option>';
        });

        document.getElementById('eventIdCard' + idx).style.display = 'block';
        document.getElementById('inventorySection' + idx).style.display = 'block';

        // Detect zones from section names
        detectZones(idx);
        buildZoneBar(idx);
        buildQuickBar(idx);

        updateSortArrows(idx);
        renderInventory(idx);
        updateTabLabel(idx);
        toast('Imported ' + state.inventoryData.length + ' entries', 'success');

      } catch (e) {
        toast('Parse error: ' + e.message, 'error');
      }
    }

    // ============ ZONE DETECTION ============
    function getZoneForSection(sectionName) {
      // Extract 3-digit section number (like 101, 205, 312, 401)
      const match = sectionName.match(/\b(\d{3})\b/);
      if (match) {
        const num = parseInt(match[1]);
        const level = Math.floor(num / 100) * 100;
        return level + 's';
      }
      // Check for level keywords
      const lower = sectionName.toLowerCase();
      if (lower.includes('floor') || lower.includes('ga') || lower.includes('general')) return 'Floor';
      if (lower.includes('club')) return 'Club';
      if (lower.includes('suite')) return 'Suite';
      if (lower.includes('box')) return 'Box';
      if (lower.includes('pit') || lower.includes('field')) return 'Field';
      return 'Other';
    }

    function detectZones(idx) {
      const state = tabState[idx];
      const zoneMap = {};
      state.inventoryData.forEach(item => {
        const zone = getZoneForSection(item.section);
        if (!zoneMap[zone]) zoneMap[zone] = { name: zone, count: 0, minPrice: Infinity };
        zoneMap[zone].count++;
        if (item.price < zoneMap[zone].minPrice) zoneMap[zone].minPrice = item.price;
      });

      // Sort zones: numeric first (100s, 200s...), then named (Club, Floor, Other)
      state.zones = Object.values(zoneMap).sort((a, b) => {
        const aNum = parseInt(a.name);
        const bNum = parseInt(b.name);
        if (!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;
        if (!isNaN(aNum)) return -1;
        if (!isNaN(bNum)) return 1;
        return a.name.localeCompare(b.name);
      });
      state.activeZone = '';
    }

    function buildZoneBar(idx) {
      const state = tabState[idx];
      const bar = document.getElementById('zoneBar' + idx);
      if (!bar || state.zones.length <= 1) { if (bar) bar.innerHTML = ''; return; }

      let html = '<span class="zone-label">Zones:</span>';
      html += '<button class="zone-btn active" data-zone="" onclick="setZone(' + idx + ',\'\')">All <span class="zone-count">(' + state.inventoryData.length + ')</span></button>';
      state.zones.forEach(z => {
        html += '<button class="zone-btn" data-zone="' + z.name + '" onclick="setZone(' + idx + ',\'' + z.name + '\')">' + z.name + ' <span class="zone-count">(' + z.count + ')</span></button>';
      });
      bar.innerHTML = html;
    }

    function buildQuickBar(idx) {
      const state = tabState[idx];
      const bar = document.getElementById('quickBar' + idx);
      if (!bar || state.inventoryData.length === 0) { if (bar) bar.innerHTML = ''; return; }

      let html = '<span class="quick-label">Quick:</span>';
      html += '<button class="quick-btn" onclick="quickCheapest(' + idx + ',\'\')"><span class="qicon">$</span> Cheapest</button>';
      state.zones.forEach(z => {
        html += '<button class="quick-btn" onclick="quickCheapest(' + idx + ',\'' + z.name + '\')"><span class="qicon">$</span> Cheapest ' + z.name + '</button>';
      });
      // Add a "select all zone" button for the most common zones
      state.zones.forEach(z => {
        html += '<button class="quick-btn" onclick="selectZone(' + idx + ',\'' + z.name + '\')"><span class="qicon">&#9745;</span> Select ' + z.name + '</button>';
      });
      bar.innerHTML = html;
    }

    function setZone(idx, zoneName) {
      const state = tabState[idx];
      state.activeZone = zoneName;

      // Update zone button styles
      document.querySelectorAll('#zoneBar' + idx + ' .zone-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.zone === zoneName);
      });

      // Show/hide zone assign bar
      const assignBar = document.getElementById('zoneAssign' + idx);
      if (assignBar) {
        if (zoneName) {
          const zone = state.zones.find(z => z.name === zoneName);
          document.getElementById('zoneAssignLabel' + idx).textContent = 'Assign all ' + zoneName + ' (' + (zone ? zone.count : '?') + ' rows):';
          assignBar.classList.add('visible');
        } else {
          assignBar.classList.remove('visible');
        }
      }

      renderInventory(idx);
    }

    function assignZone(idx, priority) {
      const state = tabState[idx];
      if (!state.activeZone) return;

      let count = 0;
      state.inventoryData.forEach(item => {
        if (getZoneForSection(item.section) === state.activeZone) {
          item._priority = priority;
          count++;
        }
      });

      renderInventory(idx);
      toast(count + ' rows in ' + state.activeZone + ' → ' + (priority ? PRIORITY_LABELS[priority] : 'Cleared'), 'success');
    }

    function quickCheapest(idx, zoneName) {
      const state = tabState[idx];
      // Set zone filter
      state.activeZone = zoneName;
      // Sort by price ascending
      state.sortCol = 'price';
      state.sortAsc = true;

      // Update zone buttons
      document.querySelectorAll('#zoneBar' + idx + ' .zone-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.zone === zoneName);
      });

      // Show zone assign if zone selected
      const assignBar = document.getElementById('zoneAssign' + idx);
      if (assignBar) {
        if (zoneName) {
          const zone = state.zones.find(z => z.name === zoneName);
          document.getElementById('zoneAssignLabel' + idx).textContent = 'Assign all ' + zoneName + ' (' + (zone ? zone.count : '?') + ' rows):';
          assignBar.classList.add('visible');
        } else {
          assignBar.classList.remove('visible');
        }
      }

      updateSortArrows(idx);
      renderInventory(idx);
      toast('Showing cheapest' + (zoneName ? ' in ' + zoneName : ''), 'info');
    }

    function selectZone(idx, zoneName) {
      const state = tabState[idx];
      let count = 0;
      // First uncheck all
      state.inventoryData.forEach(item => item._checked = false);
      // Then check matching zone
      state.inventoryData.forEach(item => {
        if (getZoneForSection(item.section) === zoneName) {
          item._checked = true;
          count++;
        }
      });
      renderInventory(idx);
      toast('Selected ' + count + ' rows in ' + zoneName, 'info');
    }

    // ============ INVENTORY TABLE ============
    function renderInventory(idx) {
      const state = tabState[idx];
      const filterSec = document.getElementById('filterSection' + idx).value.trim().toLowerCase();
      const filterPrc = document.getElementById('filterPrice' + idx).value;
      const filterPri = document.getElementById('filterPriority' + idx).value;

      let filtered = state.inventoryData.filter(item => {
        // Zone filter
        if (state.activeZone && getZoneForSection(item.section) !== state.activeZone) return false;
        if (filterSec && !item.section.toLowerCase().includes(filterSec)) return false;
        if (filterPrc && item.price !== parseFloat(filterPrc)) return false;
        if (filterPri === 'none' && item._priority) return false;
        if (filterPri === 'none' && !item._priority) return true;
        if (filterPri && filterPri !== 'none' && item._priority !== filterPri) return false;
        return true;
      });

      filtered.sort((a, b) => {
        let va, vb;
        if (state.sortCol === 'section') {
          va = a.section; vb = b.section;
          const na = parseInt(va), nb = parseInt(vb);
          if (!isNaN(na) && !isNaN(nb)) return state.sortAsc ? na - nb : nb - na;
          return state.sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        } else if (state.sortCol === 'price') { va = a.price; vb = b.price; }
        else if (state.sortCol === 'count') { va = a.count; vb = b.count; }
        else if (state.sortCol === 'type') {
          va = a.offerType || ''; vb = b.offerType || '';
          return state.sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        return state.sortAsc ? va - vb : vb - va;
      });

      // Store filtered order for shift-click range selection
      state.filteredOrder = filtered;

      const tbody = document.getElementById('inventoryBody' + idx);
      tbody.innerHTML = '';

      filtered.forEach((item, visualIdx) => {
        const tr = document.createElement('tr');
        const pClass = item._priority ? (item._priority === 'avoid' ? 'rpavoid' : 'rp' + item._priority) : '';
        if (pClass) tr.className = pClass;
        const psClass = item._priority ? (item._priority === 'avoid' ? 'psavoid' : 'ps' + item._priority) : '';

        tr.innerHTML = `
          <td><input type="checkbox" class="row-check" data-idx="${item._idx}" data-tab="${idx}" data-visual="${visualIdx}" ${item._checked ? 'checked' : ''} onclick="onRowCheck(${idx}, ${item._idx}, ${visualIdx}, this, event)"></td>
          <td>${item.section}</td>
          <td class="price-cell">$${item.price}</td>
          <td class="qty-cell">${item.count}</td>
          <td class="type-cell">${item.offerType || 'Standard'}</td>
          <td>
            <select class="priority-select ${psClass}" onchange="onPriorityChange(${idx}, ${item._idx}, this.value)">
              <option value="">—</option>
              <option value="1" ${item._priority === '1' ? 'selected' : ''}>1st Priority</option>
              <option value="2" ${item._priority === '2' ? 'selected' : ''}>2nd Target</option>
              <option value="3" ${item._priority === '3' ? 'selected' : ''}>3rd Target</option>
              <option value="avoid" ${item._priority === 'avoid' ? 'selected' : ''}>Avoid</option>
            </select>
          </td>
        `;
        tbody.appendChild(tr);
      });

      updateSummary(idx, filtered);
    }

    function onRowCheck(tabIdx, itemIdx, visualIdx, checkbox, event) {
      const state = tabState[tabIdx];
      const checked = checkbox.checked;

      // Shift+click: select range between last checked and current
      if (event.shiftKey && state.lastCheckedVisualIdx >= 0 && state.lastCheckedVisualIdx !== visualIdx) {
        const start = Math.min(state.lastCheckedVisualIdx, visualIdx);
        const end = Math.max(state.lastCheckedVisualIdx, visualIdx);

        for (let i = start; i <= end; i++) {
          if (state.filteredOrder[i]) {
            state.filteredOrder[i]._checked = checked;
          }
        }

        // Update all visible checkboxes in the range
        const allChecks = document.querySelectorAll('#inventoryBody' + tabIdx + ' .row-check');
        allChecks.forEach(cb => {
          const vi = parseInt(cb.dataset.visual);
          if (vi >= start && vi <= end) {
            cb.checked = checked;
          }
        });
      }

      state.inventoryData[itemIdx]._checked = checked;
      state.lastCheckedVisualIdx = visualIdx;
    }

    function onPriorityChange(tabIdx, itemIdx, value) {
      tabState[tabIdx].inventoryData[itemIdx]._priority = value;
      renderInventory(tabIdx);
    }

    function updateSummary(idx, filtered) {
      const state = tabState[idx];
      const assigned = state.inventoryData.filter(i => i._priority);
      const p1 = assigned.filter(i => i._priority === '1').length;
      const p2 = assigned.filter(i => i._priority === '2').length;
      const p3 = assigned.filter(i => i._priority === '3').length;
      const pa = assigned.filter(i => i._priority === 'avoid').length;

      let text = `Showing ${filtered.length} of ${state.inventoryData.length} entries`;
      if (assigned.length > 0) {
        text += ` | Assigned: `;
        const parts = [];
        if (p1) parts.push(`<span style="color:#22c55e">${p1} 1st</span>`);
        if (p2) parts.push(`<span style="color:#eab308">${p2} 2nd</span>`);
        if (p3) parts.push(`<span style="color:#3b82f6">${p3} 3rd</span>`);
        if (pa) parts.push(`<span style="color:#ef4444">${pa} avoid</span>`);
        text += parts.join(', ');
      }
      document.getElementById('summaryText' + idx).innerHTML = text;
    }

    function toggleSort(idx, col) {
      const state = tabState[idx];
      if (state.sortCol === col) state.sortAsc = !state.sortAsc;
      else { state.sortCol = col; state.sortAsc = true; }
      updateSortArrows(idx);
      renderInventory(idx);
    }

    function updateSortArrows(idx) {
      const state = tabState[idx];
      ['section','price','count','type'].forEach(col => {
        const el = document.getElementById('sortArrow' + idx + '_' + col);
        if (el) {
          if (state.sortCol === col) {
            el.textContent = state.sortAsc ? '\u25B2' : '\u25BC';
            el.style.color = '#e94560';
          } else {
            el.textContent = '';
          }
        }
      });
    }

    function toggleCheckAll(idx, checked) {
      const ca = document.getElementById('checkAll' + idx);
      const cah = document.getElementById('checkAllHead' + idx);
      if (ca) ca.checked = checked;
      if (cah) cah.checked = checked;
      document.querySelectorAll(`#inventoryBody${idx} .row-check`).forEach(cb => {
        const itemIdx = parseInt(cb.dataset.idx);
        cb.checked = checked;
        tabState[idx].inventoryData[itemIdx]._checked = checked;
      });
    }

    function assignSelected(idx, priority) {
      let count = 0;
      tabState[idx].inventoryData.forEach(item => {
        if (item._checked) {
          item._priority = priority;
          item._checked = false;
          count++;
        }
      });
      if (count === 0) { toast('No rows selected — use checkboxes first', 'error'); return; }
      const ca = document.getElementById('checkAll' + idx);
      const cah = document.getElementById('checkAllHead' + idx);
      if (ca) ca.checked = false;
      if (cah) cah.checked = false;
      renderInventory(idx);
      toast(count + ' rows → ' + (priority ? PRIORITY_LABELS[priority] : 'Cleared'), 'success');
    }

    // ============ PUSH RULES ============
    async function pushRules(idx) {
      const state = tabState[idx];
      const eventId = document.getElementById('eventIdInput' + idx).value.trim() || state.reportEventId;
      if (!eventId) { toast('Enter an Event ID', 'error'); return; }

      const assigned = state.inventoryData.filter(i => i._priority);
      if (assigned.length === 0) { toast('Assign priorities first', 'error'); return; }

      const groups = {};
      assigned.forEach(item => {
        const key = item.section + '||' + item._priority;
        if (!groups[key]) groups[key] = { section: item.section, priority: item._priority, prices: new Set() };
        groups[key].prices.add(item.price);
      });

      const rules = [];
      for (const g of Object.values(groups)) {
        const pricesArr = [...g.prices].sort((a, b) => a - b);
        rules.push({
          type: 'section',
          sections: [g.section],
          prices: pricesArr,
          priority: g.priority,
          label: (PRIORITY_LABELS[g.priority]) + ' — Sec ' + g.section + ' ($' + pricesArr.join(', $') + ')'
        });
      }

      toast('Pushing ' + rules.length + ' rules...', 'info');

      try {
        const resp = await fetch(SERVER + '/api/rules/' + eventId, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rules })
        });
        const data = await resp.json();
        if (data.success) {
          toast('Pushed ' + data.ruleCount + ' rules for Event ' + (idx + 1) + '!', 'success');
          loadActiveEvents();
        } else {
          toast('Server error: ' + (data.error || 'unknown'), 'error');
        }
      } catch (e) {
        toast('Failed: ' + e.message, 'error');
      }
    }

    // ============ ACTIVE EVENTS ============
    async function loadActiveEvents() {
      try {
        const resp = await fetch(SERVER + '/api/events');
        const events = await resp.json();
        document.getElementById('eventCount').textContent = events.length + ' event' + (events.length !== 1 ? 's' : '');

        const container = document.getElementById('activeEvents');
        if (events.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128203;</div><p>No events with rules yet</p></div>';
          return;
        }

        container.innerHTML = '';
        events.forEach(ev => {
          const div = document.createElement('div');
          div.className = 'active-event';
          const time = ev.updatedAt ? new Date(ev.updatedAt).toLocaleString() : '';
          div.innerHTML = `
            <span class="ae-id">${ev.eventId}</span>
            <span class="ae-rules">${ev.ruleCount} rules${time ? ' · ' + time : ''}</span>
            <button class="ae-delete" data-event="${ev.eventId}" title="Delete rules">&times;</button>
          `;
          container.appendChild(div);
        });

        container.querySelectorAll('.ae-delete').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const eid = btn.dataset.event;
            await fetch(SERVER + '/api/rules/' + eid, { method: 'DELETE' });
            toast('Deleted rules for ' + eid, 'info');
            loadActiveEvents();
          });
        });

      } catch (e) {
        console.log('Failed to load events:', e);
      }
    }

    // ============ VENUE MAP ============
    let mapVisible = false;

    function toggleMap(idx) {
      if (mapVisible) { hideMap(); return; }
      showMap(idx);
    }

    function showMap(idx) {
      const state = tabState[idx];
      const eventId = document.getElementById('eventIdInput' + idx)?.value.trim() || state.reportEventId;

      mapVisible = true;
      const container = document.getElementById('mainContainer');
      container.classList.add('with-map');
      document.getElementById('mapCol').style.display = 'block';

      // Update toggle button text
      const btn = document.getElementById('mapToggle' + idx);
      if (btn) btn.textContent = 'Hide Map';

      if (!eventId) {
        document.getElementById('mapPlaceholder').textContent = 'No Event ID — paste a map image URL below';
        document.getElementById('mapPlaceholder').style.display = 'block';
        return;
      }

      // Try multiple TM seating chart sources (direct + proxied)
      const directUrl = 'https://mapsapi.tmol.io/maps/geometry/3/event/' + eventId + '/staticImage?type=png&systemId=HOST';
      const mapUrls = [
        directUrl,
        SERVER + '/api/map-proxy?url=' + encodeURIComponent(directUrl),
        'https://maps.ticketmaster.com/maps/geometry/3/event/' + eventId + '/staticImage?type=png&systemId=HOST'
      ];

      loadMapImage(mapUrls, 0);
    }

    function loadMapImage(urls, index) {
      if (index >= urls.length) {
        document.getElementById('mapPlaceholder').textContent = 'Could not load venue map. Paste a map image URL below.';
        document.getElementById('mapPlaceholder').style.display = 'block';
        return;
      }

      const wrap = document.getElementById('mapImgWrap');
      const placeholder = document.getElementById('mapPlaceholder');

      // Remove old image
      const oldImg = wrap.querySelector('img');
      if (oldImg) oldImg.remove();
      placeholder.style.display = 'block';
      placeholder.textContent = 'Loading venue map...';

      const img = new Image();
      img.onload = function() {
        placeholder.style.display = 'none';
        wrap.appendChild(img);
        img.onclick = function() { img.classList.toggle('zoomed'); };
      };
      img.onerror = function() {
        loadMapImage(urls, index + 1);
      };
      img.src = urls[index];
      img.style.cssText = 'width:100%;height:auto;display:block;cursor:zoom-in;transition:transform 0.3s;';
    }

    function hideMap() {
      mapVisible = false;
      const container = document.getElementById('mainContainer');
      container.classList.remove('with-map');
      document.getElementById('mapCol').style.display = 'none';

      // Reset all toggle buttons
      for (let i = 0; i < NUM_TABS; i++) {
        const btn = document.getElementById('mapToggle' + i);
        if (btn) btn.textContent = 'Show Map';
      }
    }

    function loadCustomMap() {
      const url = document.getElementById('mapUrlInput').value.trim();
      if (!url) { toast('Enter a map image URL', 'error'); return; }

      const wrap = document.getElementById('mapImgWrap');
      const placeholder = document.getElementById('mapPlaceholder');
      const oldImg = wrap.querySelector('img');
      if (oldImg) oldImg.remove();

      placeholder.style.display = 'block';
      placeholder.textContent = 'Loading...';

      const img = new Image();
      img.onload = function() {
        placeholder.style.display = 'none';
        wrap.appendChild(img);
        img.onclick = function() { img.classList.toggle('zoomed'); };
      };
      img.onerror = function() {
        placeholder.textContent = 'Failed to load image. Check the URL.';
      };
      img.src = url;
      img.style.cssText = 'width:100%;height:auto;display:block;cursor:zoom-in;transition:transform 0.3s;';
    }

    // ============ TOAST ============
    function toast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + type + ' show';
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove('show'), 3500);
    }

    // ============ PWA INSTALL ============
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const banner = document.createElement('div');
      banner.id = 'installBanner';
      banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#111127;border-top:2px solid #e94560;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;z-index:999;';
      banner.innerHTML = '<span style="font-size:13px;">Install TM Price Admin as an app for quick access</span><div><button id="installBtn" style="padding:8px 20px;background:#e94560;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;">Install App</button><button id="dismissInstall" style="padding:8px 12px;background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:18px;margin-left:8px;">&times;</button></div>';
      document.body.appendChild(banner);

      document.getElementById('installBtn').addEventListener('click', async () => {
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        if (result.outcome === 'accepted') toast('App installed!', 'success');
        deferredPrompt = null;
        banner.remove();
      });

      document.getElementById('dismissInstall').addEventListener('click', () => banner.remove());
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/admin/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
